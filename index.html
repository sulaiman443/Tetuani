<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchFabor - البث المباشر للمباريات</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        .netflix-bg {
            background-color: #0e0e10;
        }

        .cinema-glow {
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.05) 0%, rgba(0,0,0,0) 80%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .hidden-player { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-player.active { max-height: 1000px; opacity: 1; margin-bottom: 2rem; }
        
        .netflix-slider {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .plyr--video {
            --plyr-color-main: #e50914;
            border-radius: 12px;
        }
    </style>
</head>
<body class="netflix-bg text-zinc-100 font-sans selection:bg-[#e50914] selection:text-white relative min-h-screen overflow-x-hidden pb-28">

    <div class="cinema-glow"></div>

    <div id="toast-notice" class="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-[#e50914] text-white text-xs font-bold px-4 py-2.5 rounded-md shadow-2xl transition-all duration-500 opacity-0 pointer-events-none transform translate-y-[-20px] flex items-center gap-2 border border-white/10">
        <span class="w-2 h-2 rounded-full bg-white animate-ping"></span>
        <span id="toast-text">جاري الانتقال للسيرفر الاحتياطي...</span>
    </div>

    <header class="bg-[#0e0e10]/80 backdrop-blur-xl border-b border-zinc-800/50 px-6 py-4 relative z-10 sticky top-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-black tracking-tighter text-[#e50914] uppercase">MATCH<span class="text-white font-light">FABOR</span></h1>
                <span class="w-2 h-2 rounded-full bg-[#e50914] animate-pulse self-end mb-1"></span>
            </div>
            <div class="text-xs text-zinc-400 font-medium bg-zinc-900 px-4 py-1.5 rounded-md border border-zinc-800" id="current-date"></div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 pt-4 flex justify-center relative z-10">
        <div class="bg-zinc-950/40 border border-zinc-800/60 p-2 rounded-xl overflow-hidden shadow-md max-w-full">
            <script src="https://pl29824822.effectivecpmnetwork.com/28/7f/f3/287ff3457dc6bed6facd82cac473fe6e.js"></script>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-8 relative z-10">
        
        <div class="lg:col-span-2 space-y-6">
            <div id="player-wrapper" class="hidden-player">
                <div id="fullscreen-target" class="bg-black rounded-2xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)] border border-zinc-800 aspect-video relative">
                    <video id="player" playsinline controls class="w-full h-full"></video>
                </div>
                <div class="bg-zinc-900/90 backdrop-blur-md p-5 rounded-b-2xl border-x border-b border-zinc-800/80 space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 id="current-match-title" class="font-bold text-lg text-white">اسم المباراة</h2>
                        <span class="bg-[#e50914] text-white text-[11px] px-2.5 py-0.5 rounded font-bold animate-pulse">LIVE</span>
                    </div>
                    <div>
                        <p class="text-xs text-zinc-400 mb-2">اختر سيرفر البث السريع:</p>
                        <div id="servers-container" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>

            <div id="tomorrow-slider-wrapper" class="relative bg-zinc-950 min-h-[260px] rounded-2xl border border-zinc-800/80 overflow-hidden shadow-2xl group flex flex-col justify-end p-6">
                
                <div class="absolute inset-0 bg-cover bg-center pointer-events-none z-0" style="background-image: url('https://k.top4top.io/p_3826fcdgv0.jpeg');"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0e0e10] via-[#0e0e10]/50 to-transparent z-0"></div>

                <div class="absolute top-4 right-4 z-30 flex items-center gap-2 bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-full border border-zinc-800">
                    <span class="w-2 h-2 rounded-full bg-amber-500 animate-ping"></span>
                    <span class="text-xs font-black text-amber-500 uppercase tracking-wider">الأكثر ترقباً غداً</span>
                </div>
                
                <div id="tomorrow-card-container" class="netflix-slider w-full space-y-3 z-10 relative" onmouseenter="pauseTomorrowSlider()" onmouseleave="startTomorrowSlider()">
                    <div class="text-center py-20 text-xs text-zinc-500 italic">جاري التحميل...</div>
                </div>
                
                <div id="slider-dots" class="absolute bottom-4 left-6 z-30 flex gap-1.5"></div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="font-black text-base flex items-center gap-2 text-white">
                <span class="w-1.5 h-4 bg-[#e50914] rounded-full"></span>مباريات اليوم
            </h3>
            <div id="today-matches-list" class="space-y-3.5">
                <div class="text-center py-6 text-xs text-zinc-500 italic">جاري مزامنة الأحداث الحية...</div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0e0e10]/90 backdrop-blur-xl border-t border-zinc-800/80 py-4 px-6 z-50 flex justify-center gap-4 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <button onclick="goBack()" class="flex items-center justify-center gap-2 bg-zinc-900 hover:bg-zinc-800 text-zinc-200 text-xs font-bold uppercase tracking-wider px-6 py-3 rounded-md border border-zinc-800 transition transform active:scale-95 w-full max-w-[180px]">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 rotate-180">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            الرئيسية
        </button>
        <button onclick="shareApp()" class="flex items-center justify-center gap-2 bg-[#e50914] hover:bg-[#b80710] text-white text-xs font-bold uppercase tracking-wider px-6 py-3 rounded-md transition transform active:scale-95 w-full max-w-[180px] shadow-lg shadow-[#e50914]/20">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186l5.308-2.654m-5.308 2.654l5.308 2.654m-9.754-2.654a3.75 3.75 0 117.5 0 3.75 3.75 0 01-7.5 0zm9.754-2.25a2.25 2.25 0 114.5 0 2.25 2.25 0 01-4.5 0zm0 9a2.25 2.25 0 114.5 0 2.25 2.25 0 01-4.5 0z" />
            </svg>
            مشاركة
        </button>
    </div>

    <script src="https://pl29824121.effectivecpmnetwork.com/fe/af/56/feaf562a9e970554a08f0c58019236c3.js"></script>

    <script>
        const SPREADSHEET_ID = "1E3Cw1CwCOmdvNUhOIRlLta4bmyxTBkISlHlgdX8q_Lk";
        const TODAY_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
        const TOMORROW_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet2`;

        let todayMatches = [];
        let tomorrowMatches = [];
        let tomorrowIndex = 0;
        let tomorrowInterval = null;

        let currentActiveMatchServers = [];
        let currentServerIndex = 0;
        let isSwitchingServer = false;

        const videoElement = document.getElementById('player');
        const player = new Plyr(videoElement, { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });
        let hlsInstance = null;

        function parseCSVLine(text) {
            let p = '', r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') { q = !q; }
                else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
                else { p += c; }
            }
            r.push(p.trim());
            return r;
        }

        function calculateMatchStatus(matchTimeStr) {
            if (!matchTimeStr || !matchTimeStr.includes(':')) return { text: "غير محدد", isLive: false, color: "text-zinc-500" };
            const now = new Date();
            const [hours, minutes] = matchTimeStr.split(':').map(Number);
            const matchDate = new Date();
            matchDate.setHours(hours, minutes, 0, 0);
            const diffInMinutes = (now - matchDate) / (1000 * 60);

            if (diffInMinutes < -5) return { text: "لم تبدأ بعد", isLive: false, color: "text-zinc-400 font-medium" };
            else if (diffInMinutes >= -5 && diffInMinutes <= 125) return { text: "مباشر 🔴", isLive: true, color: "text-[#e50914] font-black animate-pulse" };
            else return { text: "انتهت المباراة", isLive: false, color: "text-zinc-600 line-through" };
        }

        async function fetchTodayMatches() {
            try {
                const response = await fetch(TODAY_CSV_URL);
                const data = await response.text();
                const lines = data.split(/\r?\n/);

                todayMatches = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i]) continue;
                    const r = parseCSVLine(lines[i]);
                    if (r.length < 6 || !r[1]) continue; 

                    let servers = [];
                    if(r[8] && r[9]) servers.push({ name: r[8], url: r[9] }); 
                    if(r[10] && r[11]) servers.push({ name: r[10], url: r[11] }); 
                    if(r[12] && r[13]) servers.push({ name: r[12], url: r[13] }); 

                    const autoStatus = calculateMatchStatus(r[5]);

                    todayMatches.push({
                        id: parseInt(r[0]) || i,
                        teamA: r[1],
                        logoA: r[2],
                        teamB: r[3],
                        logoB: r[4],
                        time: r[5],
                        league: r[6],
                        status: autoStatus.text,
                        statusColor: autoStatus.color,
                        isLive: autoStatus.isLive,
                        servers: servers
                    });
                }
                renderTodayMatches();
            } catch (error) { console.error(error); }
        }

        async function fetchTomorrowMatches() {
            try {
                const response = await fetch(TOMORROW_CSV_URL);
                const data = await response.text();
                const lines = data.split(/\r?\n/);

                tomorrowMatches = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i]) continue;
                    const r = parseCSVLine(lines[i]);
                    if (r.length < 5 || !r[1]) continue; 
                    tomorrowMatches.push({
                        teamA: r[1],
                        logoA: r[2] || 'https://placehold.co/40x40?text=Logo',
                        teamB: r[3],
                        logoB: r[4] || 'https://placehold.co/40x40?text=Logo',
                        time: r[5] || '--:--',
                        league: r[6] || 'بطولة دولية'
                    });
                }
                buildDots(); startTomorrowSlider();
            } catch (error) { console.error(error); }
        }

        function buildDots() {
            const dotsContainer = document.getElementById('slider-dots');
            dotsContainer.innerHTML = '';
            tomorrowMatches.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = `h-1 rounded-full transition-all duration-300 ${idx === 0 ? 'w-4 bg-[#e50914]' : 'w-1 bg-zinc-600'}`;
                dot.id = `dot-${idx}`;
                dotsContainer.appendChild(dot);
            });
        }

        function updateDots() {
            tomorrowMatches.forEach((_, idx) => {
                const dot = document.getElementById(`dot-${idx}`);
                if(dot) dot.className = idx === tomorrowIndex ? 'h-1 w-4 bg-[#e50914] rounded-full transition-all duration-300' : 'h-1 w-1 bg-zinc-600 rounded-full transition-all duration-300';
            });
        }

        function startTomorrowSlider() {
            if (tomorrowMatches.length === 0) {
                document.getElementById('tomorrow-card-container').innerHTML = `<div class="text-center py-20 text-xs text-zinc-500 italic">لا توجد مباريات مجدولة للغد.</div>`;
                return;
            }
            renderTomorrowCard(); clearInterval(tomorrowInterval);
            tomorrowInterval = setInterval(() => {
                tomorrowIndex = (tomorrowIndex + 1) % tomorrowMatches.length;
                renderTomorrowCard(); updateDots();
            }, 3500); 
        }

        function pauseTomorrowSlider() { clearInterval(tomorrowInterval); }

        function renderTomorrowCard() {
            const container = document.getElementById('tomorrow-card-container');
            const match = tomorrowMatches[tomorrowIndex];
            if (!match) return;

            container.style.opacity = 0; 
            container.style.transform = 'scale(0.98)';
            
            setTimeout(() => {
                container.innerHTML = `
                    <div class="absolute inset-0 bg-cover bg-center filter blur-3xl opacity-20 mix-blend-screen pointer-events-none scale-125 transition-all duration-700" style="background-image: url('${match.logoA}');"></div>
                    
                    <div class="relative z-10 w-full mt-auto space-y-3">
                        <div class="text-zinc-400 font-sans text-[11px] tracking-wider font-bold text-center bg-zinc-900/40 backdrop-blur-sm py-1 px-3 rounded-full border border-zinc-800/50 inline-block mx-auto mb-1">
                            🏆 ${match.league}
                        </div>
                        
                        <div class="grid grid-cols-7 items-center bg-zinc-900/30 backdrop-blur-xl p-5 rounded-2xl border border-zinc-800/80 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                            
                            <div class="col-span-2 flex flex-col items-center justify-center text-center space-y-2">
                                <div class="w-14 h-14 bg-zinc-950/50 p-2 rounded-xl border border-zinc-800 flex items-center justify-center shadow-inner">
                                    <img src="${match.logoA}" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.6)]" onerror="this.src='https://placehold.co/40x40?text=Logo'">
                                </div>
                                <span class="font-black text-xs md:text-sm text-zinc-200 line-clamp-1 w-full px-1">${match.teamA}</span>
                            </div>
                            
                            <div class="col-span-3 flex flex-col items-center justify-center px-2">
                                <div class="w-full max-w-[120px] bg-gradient-to-b from-amber-500/10 to-amber-500/5 border border-amber-500/30 rounded-xl overflow-hidden shadow-lg shadow-amber-500/5">
                                    <div class="bg-gradient-to-r from-amber-600 to-amber-500 text-black text-[9px] font-black py-0.5 text-center uppercase tracking-wider">
                                        موعد العرض
                                    </div>
                                    <div class="bg-zinc-950/90 py-2.5 text-center text-amber-400 font-mono font-black text-base md:text-lg tracking-wide border-t border-zinc-900">
                                        ${match.time}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-span-2 flex flex-col items-center justify-center text-center space-y-2">
                                <div class="w-14 h-14 bg-zinc-950/50 p-2 rounded-xl border border-zinc-800 flex items-center justify-center shadow-inner">
                                    <img src="${match.logoB}" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.6)]" onerror="this.src='https://placehold.co/40x40?text=Logo'">
                                </div>
                                <span class="font-black text-xs md:text-sm text-zinc-200 line-clamp-1 w-full px-1">${match.teamB}</span>
                            </div>
                            
                        </div>
                    </div>`;
                container.style.opacity = 1; 
                container.style.transform = 'scale(1)';
            }, 150);
        }

        async function triggerFullscreenAndLandscape() {
            const playerWrapper = document.getElementById('fullscreen-target');
            try {
                if (playerWrapper.requestFullscreen) await playerWrapper.requestFullscreen();
                else if (playerWrapper.webkitRequestFullscreen) await playerWrapper.webkitRequestFullscreen();
                else if (videoElement.webkitEnterFullscreen) { videoElement.webkitEnterFullscreen(); return; }

                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(() => {});
                }
            } catch (error) { console.error(error); }
        }

        function showToastNotification(text) {
            const toast = document.getElementById('toast-notice');
            document.getElementById('toast-text').innerText = text;
            toast.style.opacity = "1";
            toast.style.transform = "translateY(0) translateX(-50%)";
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translateY(-20px) translateX(-50%)";
            }, 4000);
        }

        function handleServerAutoSwitch() {
            if (isSwitchingServer) return;
            
            if (currentActiveMatchServers.length > 1 && currentServerIndex < currentActiveMatchServers.length - 1) {
                isSwitchingServer = true;
                currentServerIndex++; 
                
                showToastNotification(`توقف البث الحالي، جاري الانتقال تلقائياً إلى السيرفر: ${currentActiveMatchServers[currentServerIndex].name}...`);
                
                setTimeout(() => {
                    const buttons = document.querySelectorAll('.server-btn');
                    if(buttons[currentServerIndex]) {
                        buttons[currentServerIndex].click();
                    }
                    isSwitchingServer = false;
                }, 1500);
            } else if (currentActiveMatchServers.length > 1 && currentServerIndex === currentActiveMatchServers.length - 1) {
                showToastNotification("عذراً، تم تجربة جميع السيرفرات المتاحة لهذا البث.");
            }
        }

        function playStream(url) {
            if (hlsInstance) { hlsInstance.destroy(); }
            const isHlsUrl = url.includes('m3u8') || url.includes('ts') || url.includes('stream') || url.includes('tracks-v1a1');

            if (isHlsUrl && Hls.isSupported()) {
                hlsInstance = new Hls({ maxLoadingMaxRetry: 5, manifestLoadingMaxRetry: 5 });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoElement);
                
                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                setTimeout(() => { handleServerAutoSwitch(); }, 2000);
                                break;
                        }
                    }
                });

                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.play(); triggerFullscreenAndLandscape();
                });
            } 
            else {
                videoElement.src = url;
                player.play(); triggerFullscreenAndLandscape();
            }
        }

        videoElement.addEventListener('error', () => { 
            setTimeout(() => {
                if (videoElement.error) {
                    handleServerAutoSwitch(); 
                }
            }, 3000); 
        });

        function activeMatchPlayer(matchId) {
            const match = todayMatches.find(m => m.id === matchId);
            if (!match) return;

            document.getElementById('tomorrow-slider-wrapper').classList.add('hidden');
            const wrapper = document.getElementById('player-wrapper');
            wrapper.classList.add('active');
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });

            document.getElementById('current-match-title').innerText = `${match.teamA} ضد ${match.teamB}`;
            const serversContainer = document.getElementById('servers-container');
            serversContainer.innerHTML = ''; 

            currentActiveMatchServers = match.servers;
            currentServerIndex = 0;
            isSwitchingServer = false;

            if(match.servers.length === 0) {
                serversContainer.innerHTML = `<span class="text-xs text-zinc-500 italic">لا توجد سيرفرات متوفرة للبث حالياً.</span>`;
                return;
            }

            match.servers.forEach((server, index) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 text-xs font-black rounded bg-zinc-800 border border-zinc-700 text-zinc-300 hover:bg-[#e50914] hover:text-white hover:border-[#e50914] transition duration-200 server-btn`;
                btn.innerText = server.name;
                btn.onclick = () => {
                    currentServerIndex = index; 
                    document.querySelectorAll('.server-btn').forEach(b => b.className = b.className.replace('bg-[#e50914] text-white border-[#e50914]', 'bg-zinc-800 text-zinc-300 border-zinc-700'));
                    btn.className = btn.className.replace('bg-zinc-800 text-zinc-300 border-zinc-700', 'bg-[#e50914] text-white border-[#e50914]');
                    playStream(server.url);
                };
                serversContainer.appendChild(btn);
                if (index === 0) btn.click();
            });
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement && screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        });

        function renderTodayMatches() {
            const container = document.getElementById('today-matches-list');
            container.innerHTML = '';
            if(todayMatches.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-xs text-zinc-500 italic">لا توجد مباريات مباشرة اليوم.</div>`;
                return;
            }
            todayMatches.forEach(match => {
                const card = document.createElement('div');
                const liveBorder = match.isLive ? "border-[#e50914]/40 shadow-[0_4px_20px_rgba(229,9,20,0.15)]" : "border-zinc-800/80 shadow-black";
                card.className = `bg-zinc-900/60 backdrop-blur-md border p-4 rounded-xl cursor-pointer hover:scale-[1.02] hover:border-zinc-700 transition duration-300 shadow-xl ${liveBorder}`;
                card.setAttribute('onclick', `activeMatchPlayer(${match.id})`);
                card.innerHTML = `
                    <div class="flex justify-between items-center text-[11px] text-zinc-400 font-bold mb-2.5">
                        <span>🏆 ${match.league}</span>
                        <span class="${match.statusColor}">${match.status}</span>
                    </div>
                    <div class="flex justify-between items-center text-center">
                        <div class="w-1/3 flex flex-col items-center"><img src="${match.logoA}" class="w-8 h-8 object-contain mb-1.5 filter drop-shadow" onerror="this.src='https://placehold.co/40x40?text=Logo'"><span class="font-black text-xs text-zinc-100">${match.teamA}</span></div>
                        <div class="w-1/3"><span class="bg-black/60 text-zinc-300 px-2.5 py-1 rounded text-[11px] font-mono border border-zinc-800 shadow-inner">${match.time}</span></div>
                        <div class="w-1/3 flex flex-col items-center"><img src="${match.logoB}" class="w-8 h-8 object-contain mb-1.5 filter drop-shadow" onerror="this.src='https://placehold.co/40x40?text=Logo'"><span class="font-black text-xs text-zinc-100">${match.teamB}</span></div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function goBack() {
            if (player) player.pause();
            document.getElementById('player-wrapper').classList.remove('active');
            document.getElementById('tomorrow-slider-wrapper').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function shareApp() {
            const shareData = { title: 'MatchFabor', text: 'شاهد أقوى المباريات الحية بث مباشر بدون تقطيع على MatchFabor!', url: window.location.href };
            if (navigator.share) { navigator.share(shareData).catch((error) => console.log(error)); } 
            else { navigator.clipboard.writeText(window.location.href); alert('تم نسخ رابط منصة البث بنجاح!'); }
        }

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ar-MA', options);

        fetchTodayMatches(); fetchTomorrowMatches();
        setInterval(fetchTodayMatches, 60000);
    </script>
</body>
</html>
